ServerName localhost

<VirtualHost *:${PORT}>
    DocumentRoot /var/www/html

    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

    RewriteEngine On

    # API → PHP backend
    RewriteCond %{REQUEST_URI} ^/api/
    RewriteRule ^/api/(.*)$ /var/www/backend/public/index.php [L,QSA]

    # Storage uploads passthrough
    Alias /storage /var/www/backend/storage/uploads
    <Directory /var/www/backend/storage/uploads>
        Options -Indexes
        Require all granted
    </Directory>

    # Frontend SPA
    <Directory /var/www/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteRule ^ /index.html [L]

    # PHP backend directory
    <Directory /var/www/backend/public>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
