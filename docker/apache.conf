ServerName localhost

# ── PHP backend (port 8080 internal) handled by php-fpm or direct include ───
# We use a single vhost: /api/* goes to PHP, everything else is the React SPA.

<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Pass Authorization header through for JWT
    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

    RewriteEngine On

    # ── API: rewrite /api/* to the PHP backend entry point ──────────────────
    RewriteCond %{REQUEST_URI} ^/api/
    RewriteRule ^/api/(.*)$ /var/www/backend/public/index.php [L,QSA]

    # ── Storage/uploads passthrough ──────────────────────────────────────────
    RewriteCond %{REQUEST_URI} ^/storage/
    RewriteRule ^/storage/(.*)$ /var/www/backend/storage/uploads/$1 [L]

    # ── Frontend: serve static files, fallback to index.html ────────────────
    <Directory /var/www/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteRule ^ /index.html [L]

    # ── Backend directory ────────────────────────────────────────────────────
    <Directory /var/www/backend/public>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/backend/storage/uploads>
        Options -Indexes
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
